name: FR24 Daily Summary

on:
  schedule:
    - cron: "0 0 * * *"   # midnight UTC every day
  workflow_dispatch:

jobs:
  run-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Daily Summary
        env:
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: python daily_summary.py
