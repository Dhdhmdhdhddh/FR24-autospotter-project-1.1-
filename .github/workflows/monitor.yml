name: FR24 Monitor

on:
  schedule:
    - cron: "*/8 * * * *"   # every 8 minutes
  workflow_dispatch:

concurrency:
  group: fr24-monitor
  cancel-in-progress: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3   # prevents stuck runs from blocking future runs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Heartbeat log
        run: echo "Starting FR24 monitor at $(date -u)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests FlightRadarAPI beautifulsoup4

      - name: Run FR24 monitor
        env:
          FR24_USERNAME:       ${{ secrets.FR24_USERNAME }}
          FR24_PASSWORD:       ${{ secrets.FR24_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py
